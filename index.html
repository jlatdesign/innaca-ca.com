<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INNACA - En Construcción</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    color: #fff;
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .stripes {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 8px;
    background: repeating-linear-gradient(
      90deg,
      #f5c800 0px, #f5c800 40px,
      #000 40px, #000 50px,
      #cc1a1a 50px, #cc1a1a 90px,
      #000 90px, #000 100px
    );
  }
  .stripes-bottom {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 8px;
    background: repeating-linear-gradient(
      90deg,
      #f5c800 0px, #f5c800 40px,
      #000 40px, #000 50px,
      #cc1a1a 50px, #cc1a1a 90px,
      #000 90px, #000 100px
    );
  }
  .container {
    text-align: center;
    padding: 40px 24px;
    max-width: 700px;
    width: 100%;
  }
  .logo-area {
    margin-bottom: 36px;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  .logo-area img {
    max-width: 420px;
    width: 100%;
    height: auto;
    display: block;
  }
  .divider { width: 60px; height: 2px; background: #cc1a1a; margin: 0 auto 28px; }
  .icon-construction { font-size: 52px; margin-bottom: 16px; animation: bounce 2s infinite; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .title {
    font-size: 28px;
    font-weight: 700;
    color: #f5c800;
    text-transform: uppercase;
    letter-spacing: 6px;
    margin-bottom: 12px;
  }
  .subtitle { font-size: 15px; color: #aaa; line-height: 1.6; margin-bottom: 32px; }
  .progress-label { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; text-align: left; }
  .progress-bar-bg { background: #1a1a1a; border-radius: 4px; height: 6px; overflow: hidden; margin-bottom: 28px; }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #cc1a1a, #f5c800);
    border-radius: 4px;
    width: 0%;
    animation: fillBar 2s ease-out forwards;
    animation-delay: 0.5s;
  }
  @keyframes fillBar { to { width: 65%; } }
  .contact { font-size: 13px; color: #555; border-top: 0.5px solid #222; padding-top: 20px; margin-top: 4px; }
  .contact a { color: #f5c800; text-decoration: none; }
  .contact a:hover { text-decoration: underline; }
</style>
</head>
